services:
  postgres:
    image: postgres:16-alpine
    container_name: ggseeds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ggseeds
      POSTGRES_USER: ggseeds
      POSTGRES_PASSWORD: ggseeds
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
