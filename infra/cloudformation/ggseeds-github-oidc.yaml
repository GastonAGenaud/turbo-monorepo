AWSTemplateFormatVersion: "2010-09-09"
Description: Bootstrap para permitir que GitHub Actions despliegue la infra de GGseeds vía OIDC.

Parameters:
  GitHubOwner:
    Type: String
  GitHubRepository:
    Type: String
  GitHubBranch:
    Type: String
    Default: main
  RoleNamePrefix:
    Type: String
    Default: ggseeds-github

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${RoleNamePrefix}-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOwner}/${GitHubRepository}:ref:refs/heads/${GitHubBranch}"
      Policies:
        - PolicyName: deploy-ggseeds-infra
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:*
                  - ecr:*
                  - ecs:*
                  - events:*
                  - iam:*
                  - logs:*
                  - s3:*
                  - secretsmanager:*
                  - ssm:*
                  - ec2:Describe*
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - sts:GetCallerIdentity
                Resource: "*"

Outputs:
  GitHubDeployRoleArn:
    Value: !GetAtt GitHubDeployRole.Arn
