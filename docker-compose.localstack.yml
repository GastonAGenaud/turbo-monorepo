services:
  localstack:
    image: localstack/localstack:3.4
    container_name: ggseeds-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=cloudformation,s3,secretsmanager,ssm,logs,iam,sts
      - AWS_DEFAULT_REGION=us-east-1
      - DEBUG=0
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  localstack-data:
