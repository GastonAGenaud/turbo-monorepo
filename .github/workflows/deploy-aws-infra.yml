name: Deploy AWS Infra

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "Dockerfile.scraper"
      - "scripts/aws/**"
      - "scripts/vercel/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-aws-infra.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_STACK_NAME: ${{ vars.AWS_STACK_NAME || 'ggseeds-prod' }}
      AWS_ENVIRONMENT: ${{ vars.AWS_ENVIRONMENT || 'prod' }}
      AWS_VPC_ID: ${{ vars.AWS_VPC_ID }}
      AWS_ECS_SUBNET_IDS: ${{ vars.AWS_ECS_SUBNET_IDS }}
      SCRAPER_SCHEDULE_EXPRESSION: ${{ vars.SCRAPER_SCHEDULE_EXPRESSION || 'cron(0 10 * * ? *)' }}
      MARKUP_PERCENT_DEFAULT: ${{ vars.MARKUP_PERCENT_DEFAULT || '15' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}

      - name: Validate template
        run: aws cloudformation validate-template --template-body file://infra/cloudformation/ggseeds-stack.yaml

      - name: Deploy stack
        run: |
          aws cloudformation deploy \
            --stack-name "$AWS_STACK_NAME" \
            --template-file infra/cloudformation/ggseeds-stack.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ProjectName=ggseeds \
              EnvironmentName="$AWS_ENVIRONMENT" \
              DeploymentMode=aws \
              ExistingDatabaseUrl='${{ secrets.AWS_DATABASE_URL }}' \
              CronSecretValue='${{ secrets.IMPORT_CRON_TOKEN }}' \
              MarkupPercentDefault="$MARKUP_PERCENT_DEFAULT" \
              ScraperScheduleExpression="$SCRAPER_SCHEDULE_EXPRESSION" \
              VpcId="$AWS_VPC_ID" \
              EcsSubnetIds="$AWS_ECS_SUBNET_IDS"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync storefront envs in Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID_STOREFRONT != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_STOREFRONT: ${{ secrets.VERCEL_PROJECT_ID_STOREFRONT }}
        run: pnpm vercel:sync:storefront-env

      - name: Sync admin envs in Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID_ADMIN != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_ADMIN: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
        run: pnpm vercel:sync:admin-env

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR repository
        id: ecr
        run: |
          REPO_URI="$(aws cloudformation describe-stacks \
            --stack-name "$AWS_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ScraperEcrRepositoryUri'].OutputValue" \
            --output text)"
          echo "repo_uri=${REPO_URI}" >> "$GITHUB_OUTPUT"

      - name: Build and push scraper image
        if: steps.ecr.outputs.repo_uri != ''
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -f Dockerfile.scraper \
            -t "${{ steps.ecr.outputs.repo_uri }}:${GITHUB_SHA}" \
            -t "${{ steps.ecr.outputs.repo_uri }}:latest" \
            .
